body:
  text: 目次鎮江府大聖普照禪寺語錄真州報恩光孝禪寺語錄安吉州道場山護聖萬壽禪寺語錄法語贊佛祖頌古偈頌行實運菴和尚住鎮江府大聖普照禪寺語錄侍者元靖編師開禧二年三月初八日平江府寶華山受請入寺三門豁開戶牗直出直入鮎魚上竹竿俊鶻趂不及泗洲殿出現楊州坐斷壽丘脚跟不點地贏得一身愁不是冤家不聚頭方丈日面月面霹𮦷閃電直下來也急著眼看拈帖馬頭回牛頭沒一字入公門九牛曳不出拈衣箇樣皮毛千化萬變黃梅鷲頭謾自流傳後代兒孫可貴可賤法座坐而不住住而不坐滴水生氷因風吹火陞座拈香祝聖畢次拈香云此香堪笑又堪悲剛把愁腸說向誰冶父山前曾落節千鈞之重一毫釐盡情拈出供養前住臨安府景德靈隱禪寺松源老師大和尚用酬法乳之恩遂就座甘露諾庵肇和尚白槌云法筵龍象眾當觀第一義師曰鼓聲未動此座未陞好箇古佛樣子莫有知時別宜底麼僧問橫擔拄杖縱橫虎穴魔宮倒握吹毛直下殺佛殺祖正與麼時如何師曰崖崩石裂進曰今日小出大遇去也師云勾賊破家進云師唱誰家曲宗風嗣阿誰師曰驢事未去馬事到來進云莫是松源的子東山正傳麼師云此去西天十萬程進云向上還有事也無師云一東二冬叉手當胷進云學人不會師云江西馬大師南岳讓和尚僧禮拜師云今日失利乃云衝開碧落萬象平沉喝散白雲古今獨露全彰意氣不在躊躇撒火飛星擡眸萬里鞠其趣向別有來端妙轉綿綿甚生標格直得三世諸佛六代祖師只眨得眼到者裡推不進前拽不退後世出世間承誰恩力還委悉麼萬方有慶歸明主又見黃河一度清復舉閩王請羅山陞堂山斂衣顧視大眾便下座王近前執山手云靈山一會何異今日山云將謂你是箇俗漢師拈云龍驤虎驟玉轉珠回裂破古今白珪無砧雖然坐致太平要且未能勦絕擊拂子打刀須是𠚼州銕白槌云諦觀法王法法王法如是當晚小參衲僧家如龍似虎飄風驟雲阿誰奈何得你有時拈一莖艸作丈六金身有時吹一布毛傳正法眼離四句絕百非清寥寥白滴滴直透萬重關不住青霄外千手大悲提不起爍迦羅眼莫能窺至於提一機示一境崖崩石裂百川倒流為佛祖梯航作人天榜樣與麼告報還有人檢點麼卓拄杖云駟不及舌復舉瑯琊和尚問法華和尚近離甚處公案師拈云盡謂瑯琊被法華干戈爭知法華被瑯琊勘破雖然豈不見道見利而忘義故君子之道鮮矣謝兩序上堂風雲合匝龍虎交馳一進一退各適其宜叢林烜赫慧命流輝壽丘面皮厚多少惟許通方作者知上堂入院數日來人事閙閧閧兩脚走如烟眼不見鼻孔大聖師聞得出來道箇希有何故過去燈明佛本光瑞如此淮東歸上堂歸來出去迦葉貧阿難富出去歸來南天台北五臺目前包褁滿面塵埃禹力不到處河聲流向西上堂舉靈雲見桃花悟道頌玄沙云諦當甚諦當敢保老兄未徹在師云同坑無異土決定有疎親松源先師忌日拈香近之不遜遠之則然無義無情可貴可賤一年一度雪深冤畢竟無人是的傳上堂過去諸如來斯門已成就一槌擊碎現在諸菩薩今各入圓明風火交煎未來修學人當依如是住舌拄上齶壽丘與麼道也是與賊過梯瑯琊蒙谷和尚至上堂故人方外來相見便相悉倒指三十年道義同一日鐵壁銀山十分狼藉直得同聲相應同氣相求西河師子在汾州上堂舉曹山因僧問清稅孤貧乞師賑濟山召云稅闍黎僧應諾山云青原白家三盞酒喫了猶道未沾唇師云毒攻毒楔出楔老曹山不識別那裡是者僧喫酒處真州報恩光孝禪寺語錄侍者智能編拈帖令不虗行箭不虗發儻或躊躇二九十八歲旦上堂舉僧問鏡清新年頭還有佛法也無清云有僧云如何是新年頭佛法清云元正啟祚萬物咸新僧云謝師答話清云鏡清失利又僧問明教新年頭還有佛法也無教云無僧云年年是好年日日是好日為什麼却無教云張公喫酒李公醉僧云老老大大龍頭蛇尾教云今日失利師拈云有與無非意氣明教鏡清二俱失利有問報恩新年頭還有佛法也無拈拄杖便打何故總不可作野狐精見解上堂黃蘗示眾云汝等諸人盡是噇酒糟漢公案舉了拈云洞門無鑰劒閣崔嵬風露高寒且非人世是則是天上人間知幾幾者僧一問不將來黃蘗通身是泥水冬至上堂卓拄杖云一陽生也樹頭驚起雙雙魚石上迸出長長筍靠拄杖云即日伏惟兩序高人現前清眾履茲長至倍膺戩穀喝一喝俗氣未除上堂季春漸暄鳥啼花笑恒沙數見聞覺知悉皆了了因甚西天老凍膿總被聲色轉却致令後代兒孫一箇箇擡脚不起且道利害在什麼處金屑雖貴落眼成翳上堂一葉落天下秋一塵起大地収臨濟掌黃蘗南泉喚趙州開口不在舌頭上夜濤催發海南舟安吉州道場山護聖萬壽禪寺語錄侍者惟衍編上堂龍吟虎嘯斗轉星移剗除上古風規開闢今時樞要法社自然號令斯文可以日新一舉堂頭如何敲唱妙舞不須誇拍變三臺須是大家催上堂舉臨濟入京教化至一家門首云家常添鉢婆云太無厭生濟云飯也未得何言太無厭生婆便閉却門師拈云家常添鉢臨濟平地活埋太無厭生婆婆死而不吊上堂舉石霜慈明或時方丈內以水一盆上劄一口劒下面著一緉草鞋以拄杖橫按膝上僧入門便指擬議棒出師拈云巧笑倩兮美目盻兮素以為絢兮顯慈諾庵和尚至上堂顯慈鼻祖諾庵法兄機如電掣辯似河傾無心相撞著分外得人憎彼此不堪為種艸先師之道轉跉𨂲上堂山僧昨夜三更夢中被一陣黑風吹墮羅剎鬼國幾乎性命不存賴得曉鐘一動驚覺起來開眼合眼千頭百緒帶累胡達磨釋迦文祖閣漆桶堂中上座總少他一分不得何故仁義盡從貧處斷世情偏向有錢家松源先師塔頭拈香斷楊歧正脉壞臨濟鋼宗赤土塗牛嬭密室不通風身前身後不了深瘞白雲之中非父非子挾路相逢㵎藻溪蘋相鈍置謝郎錯認釣魚船上堂舉資福示眾云隔江見資福剎竿便回脚跟下如與三十棒何況過江來時有僧纔出福云不堪共語師拈云勾賊破家靈隱石鼓和尚至請上堂師引座云宗門中有一千七百則公案號曰古令又為長物拈起則污人唇齒且撥置一邊衲僧家各有一則公案籬坍壁倒塞壑填溝直是扶持不起問佛不會問祖不會問向來大白無用叔祖不會問靈隱松源先師不會道場也不會幸遇石鼓法叔光訪山間必為解粘去縛抽釘拔楔使小姪舉眾得箇安樂也不定所謂一東二冬叉手當胸下坡不走快便難逢下座同伸攀請願垂開示開山伏虎禪師忌日拈香老訥今朝死老巖今日生二俱無伎倆有夢不同牀夤緣繼踵香火荒凉肝膓銕作也須裂驢屎如何比麝香元宵上堂一燈然出百千燈燈燈無盡不審這一燈從甚處出卓拄杖且不從者裡出良久云竹杖化龍去痴人戽夜塘上堂毀於佛謗於法不入眾數是什麼人道場賦性偏窄直是不容不免與佗本分草料擯向他方世界冷地裏有箇瞥地終不孤負老僧冬夜舉洞山與泰首座喫果子公案師云老洞山玷辱宗風泰首座埋沒自己雙雙繡出鴛鴦千古扶持不起伏虎禪師忌日拈香四年承乏雲峰寺暗寫秋膓寄阿誰每到十一月初五一狐疑了一狐疑故我開山伏虎禪師指柳罵楊傷龜恕鼈你死我活莫說一盌麁茶一炷香也勝和盲㪍訴瞎除夜小參千聖不傳底機填溝塞壑衲僧道不得底句戴角擎頭年窮歲盡命若懸絲臘盡春回石人撫掌與麼與麼法出奸生不與麼不與麼徐六擔版如斯告報且不作佛法商量又不作世諦流布只如東村王老夜燒錢又作麼生喝一喝復舉德山小參不答話公案師拈云德山平生據一條白棒佛來也打祖來也打無端向這僧面前納疑致令千古之下遭人檢點今夜莫有救得德山底麼擲下拄杖松源先師忌日拈香項短耳聵千妖百怪如是三十年續東山正脉我也錯商量三拜一爐香一任傍人說短長法語示守德禪人佛祖之道如大日輪昇于虗空無所不燭只為情生智隔想變體殊故勞我黃面老師四十九年東說西說末後拈花微笑至於西天此土祖祖聯芳燈燈分𦦨無非提持箇事不妨透頂透底截銕斬釘可謂一盲引眾盲相牽入火坑若是箇殺佛殺祖底漢便乃逆風揚塵衝波激浪朝游羅浮暮歸檀特羅籠不肯住呼喚不回頭於佛界魔界刀山火聚出沒變通自由自在滅却臨濟正宗瞎却正法眼藏似與麼操志立身似與麼出家行脚似與麼提持正令也只救得一半況或三咬兩咬咬不斷依前打入骨董袋裡去非唯埋沒自己亦乃鈍置先宗莫恠壽丘多口你自冷地相度示龍華會首韋德通抱道之士根器不同舉措有異凡吐言出氣千聖莫知趣向縱是釋迦彌勒亦難近傍至於瞥轉生死去來淨穢兩境逆順是非塵勞煩惱轉見力量彌著確乎其不可豈止虗而靈空而妙如青天轟一箇霹𮦷擬擡頭早覔他蹤跡不得蓋命根一斷到大安樂之場了無餘事日銷萬兩黃金亦未為分外喚什麼作涅槃般若喚什麼作直指單傳喚什麼作生死根塵喚什麼作天堂地獄大咲一聲天回地轉若如是操履方有少分相應稍胸中礙膺之物不除妄相升沈不歇要擬向上宗乘如掉棒打月若欲易會一發打辨精神屏却舊時窠窟一躍龍門飛騰雲漢至不可說不可說香水海那邊猶有餘地豈止敵生死者哉不見蟾首座問洞山佛真法身猶若虗空應物現形如水中月作麼生說箇應底道理山云如驢覰井蟾云是則是只道得八成山云首座作麼生蟾云如井覰驢看它古德漆桶相挨便乃生風起艸向未開口以前揑定咽喉則彼此有分堪為從上爪牙後世龜鑑者也余丙寅歲季秋來掃洒是剎適邊事未寧米價湧貴而會中供辨米麥不輟蓋會首處士韋德通正因出家正因修行正因操履留心於法門有年補於常住者多矣晚年之間究竟向上一段光明為敵生死照破昏暗超出三際乃是不虗出家之志袖軸炷看求語警䇿書此昭示云贊佛祖觀音大士草木丘陵風雷雲氣具足妙相尊證入三摩地萬象森羅從鼎沸達磨大師葦航身險風急水寒九年面壁用盡心肝大唐人不識隻履過西天單傳直指待驢年百丈大師親見馬簸箕面目甚奇怪鼻痛野鴨飛漆桶好不快只見祥麟一角尖定知罪犯彌天大布袋和尚山月未出海雲忽飄瞑目而坐歸路迢迢布袋裡頭無長物許誰胡蝶夢溪橋濟顛書記毀不得贊不得天台出得箇般僧一似青天轟霹𮦷走京城無處覔業識忙忙風流則劇末後筋斗背飜煅出水連天碧稽首濟顛不識不識挾路相逢捻鼻頭也是普州人送賊頌古世尊指天地自謂五更侵早起誰知更有夜行人條風塊雨今非昔堯舜垂衣萬國賓初祖見梁王擡頭霹𮦷不容追缺齒胡僧陷鐵圍六合空空風悄悄杜䳌啼月不如歸心不是佛智不是道月淡江空泛小舟唱歌和月看江流更深欹枕夢何處兩峰清霜曉未収狗子無佛性銕壁銀山幾萬重有無之字若為通斬關豈在搴旗手枉有虗名落漢中趙州洗鉢洗鉢家家事一同新羅不在海門東因行掉臂趙州老身在烟蘿第幾重百丈野狐搽抔抹粉沒人猜五百生中與麼來覿體風流有多少不知何處可安排趙州百骸百骸一物貞薰天風起今朝病一般酷恨雙雙醫不得枕邊空聽鴈聲寒青州布衫等閑提起七斤衫多少禪和著意參盡向青州做窠窟不知春色在江南芭蕉拄杖洗膓換骨老芭蕉拄杖拈來價轉高賣與買人人不買翻令平地起波濤密菴沙盆如是如何正法眼驀然突出破沙盆依俙渭北春天樹彷彿江東日暮雲偈頌大義渡孩兒不見棄渾身可惜婆婆眼不親白浪洪波無了日至今愁殺渡頭人大藏主號鏡中孤光不墮有無間碧落衝開萬象寒撲破果然亡朕跡從教大地黑漫漫寄天目禮書記閩回爪牙消息露三山勘破曾郎想不難一嘯歸來千嶂曉於菟不似舊時斑寄太白幸首座糞火堆頭潦倒身且無花鳥閙芳春口邊白醭心如銕甘作叢林不義人題戢菴居士竹亭疎疎綠葉起清風屈指巡簷數不窮幽致果然難比況此君未必在其中送僧見孟侍郎三秋月冷半山雲來謁維摩必有因特見嶺梅開一朵也應知道不干春乘禪者歸蜀出劍門兮入劍門眼空寰宇一閑身杖挑一滴江南水散作西川劫外春送洪維那笑把虗空一口吞髑髏瞥轉振乾坤破沙盆有兒孫在玉笛橫吹出海門自贊斷楊岐正脉滅臨濟綱宗猿啼碧嶂月鎻千峰影落于闐國人在大遼東應緣淡泊無分從容謂是運菴真面目澄潭不許臥蒼龍又智密副寺請妙在轉處密在汝邊繪予面目正中乖偏踏飜却謝郎船不撥萬象火冷灰寒我有丰子分誰道不完全十分狼藉難収拾微風吹動碧琅玕炎宋安吉州道場山護聖萬歲禪寺運菴禪師行實師諱普巖字少瞻高宗紹興廿六年丙子生於四明杜氏也稍長泊然不肯從俗屈首亟從剃落初與石鼓夷公謁無用全公洎諸老孝宗淳熈十一年甲辰春正月松源岳禪師出世平江澄照唱密菴之道洗鉢眾底參叩勤確時年三十也未幾松源遷江陰之光孝無為之冶父師皆從室中激揚水乳相合命師侍香山中也光宗紹熈改元庚戌秋九月董饒之薦福引師居悅眾解職錦旋矣松源以偈一章贐之冶父門庭索索東湖風波甚惡知心能有幾人萬里秋天一鶚松源領明之香山蘇之虎丘杭之靈隱報慈凡八會十八年形影相從玄微鑠盡甞在靈隱分座接納以母故回鄉北磵簡公作長句唁出叢林至今咏之寧宗嘉泰二年壬甲秋八月松源臨示寂以所傳白雲端禪師法衣再頂相授與師却衣受像倩破菴師叔請贊江湖伏其識矣師之兄喬仲創菴于四明即運菴也請師居之台州般若北磵簡公製勸請疏開禧二年丙寅春三月師在蘇臺寶華受鎮江大聖請出世拈衣云箇樣皮毛千化萬變黃梅鷲嶺漫自流傳後代兒孫可貴可賤陞座拈香祝聖畢次拈香云此香堪笑又堪悲剛把愁膓說向誰冶父山前曾落節千鈞之重一毫釐盡情拈出供養前住臨安府景德靈隱禪寺松源老師大和尚用酬法乳之恩移真之天寧湖之道場盖道場開山訥禪師者湖州許氏目有重瞳垂手過膝抵豫得心印於翠微學禪師乃憩止于此山薙草卓菴參徒四至遂成禪苑廣闡法化所遺壞衲三事及拄杖木屐現今在影堂中甞行道之時猛摯之獸馴戢如奉教以故舉世稱伏虎祖師者也師從領寺事宿獘為之一革胥曰伏虎再來也夢菴在居士讚師像曰松源嫡嗣伏虎後身接物有驗見地不親叢林沾潤恩波闊萬古雲峰翠色新理宗寶慶二年丙戌秋八月初四日坐化于此山享年七十有一請靈隱石鼓夷和尚為對小參云天澤之道流入東海汜濫浩澣暨于無垠者從我老運菴一片古帆發洋出來也其三會錄雖舊刻較存豕亥漫漶惜乎不與聵翁陳祖之語並行也予甞藏一本爰并之江月玩公重修自不揣膚尠覃意校讐且加訓點以授劂氏儻或有箇漢道天澤玄源果流通也未麼即曰君其問諸水濵元祿甲戌七年小至日武丘容安軒屬末宗著拜識
